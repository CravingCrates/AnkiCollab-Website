<script>
/* Accessibility helper: announce messages to screen readers via live regions */
window.a11yAnnounce = function(message, priority) {
    var el = document.getElementById(priority === 'assertive' ? 'a11y-alert' : 'a11y-status');
    if (el) {
        el.textContent = '';
        setTimeout(function() { el.textContent = message; }, 100);
    }
};
