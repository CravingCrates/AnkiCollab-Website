
<!DOCTYPE html>
<html class="h-100" lang="en">

<head>
    {% set page_title = "Sign In" %}
    {% include "header_template.html" %}

</head>

<body class="h-100">
    
    <!--*******************
        Preloader start
    ********************-->
    <div id="preloader" role="status" aria-label="Loading">
        <div class="loader">
            <svg class="circular" viewBox="25 25 50 50" aria-hidden="true" focusable="false">
                <circle class="path" cx="50" cy="50" r="20" fill="none" stroke-width="3" stroke-miterlimit="10" />
            </svg>
        </div>
    </div>
    <!--*******************
        Preloader end
    ********************-->

    



    <div class="login-form-bg h-100">
        <div class="container h-100">
            <div class="row justify-content-center h-100">
                <div class="col-xl-6">
                    <div class="form-input-content">
                        <div class="card login-form mb-0">
                            <div class="card-body pt-5">
                                <h1 class="text-center">Sign in</h1>
        
                                <form action="/login" method="post" class="mt-5 mb-5 login-input">
                                    <div class="form-group">
                                        <label for="login-username" class="visually-hidden">Username</label>
                                        <input type="text" class="form-control" placeholder="Username" name="username" id="login-username" autocomplete="username" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="login-password" class="visually-hidden">Password</label>
                                        <input type="password" class="form-control" placeholder="Password" name="password" id="login-password" autocomplete="current-password" required>
                                    </div>                                    
                                    <div class="form-group">
                                        <label for="cookie">
                                            <input type="checkbox" class="css-control-input" id="cookie" name="cookie"> <span class="css-control-indicator"></span> Stay signed in (uses cookie)
                                        </label>
                                    </div>
                                    <button class="btn login-form__btn submit w-100" type="submit">Sign In</button>
                                </form>                                
                                <p class="mt-5 login-form__footer">No account? <a href="/signup" class="text-primary">Create one!</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    

    <!--**********************************
        Scripts
    ***********************************-->
    <script src="/static/plugins/common/common.min.js"></script>
    <script src="/static/js/custom.min.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/gleek.js"></script>
    <script src="/static/js/styleSwitcher.js"></script>
</body>
</html>
